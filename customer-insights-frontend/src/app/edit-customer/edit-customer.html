<h2>Edit Customer</h2>

<form *ngIf="customer" (ngSubmit)="update()">
  <label>First Name</label>
  <input [(ngModel)]="customer.firstName" name="firstName">

  <label>Last Name</label>
  <input [(ngModel)]="customer.lastName" name="lastName">

  <label>Email</label>
  <input [(ngModel)]="customer.email" name="email">

  <label>Phone</label>
  <input [(ngModel)]="customer.phoneNumber" name="phoneNumber">

  <label>Date of Birth</label>
  <input type="date" [(ngModel)]="customer.dateOfBirth" name="dob">

  <label>Risk Category</label>
  <input [(ngModel)]="customer.riskCategory" name="risk">

  <button type="submit">Update</button>
</form>
