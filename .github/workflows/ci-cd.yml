name: CI/CD

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Backend build & image
      - name: Build backend image
        run: |
          cd customer-insights-backend
          docker build -t customer-insights-api .

      # Frontend build & image
      - name: Build frontend image
        run: |
          cd customer-insights-frontend
          docker build -t customer-insights-ui .

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push backend image
        run: |
          docker tag customer-insights-api vasantha49/customer-insights-api:latest
          docker push vasantha49/customer-insights-api:latest

      - name: Push frontend image
        run: |
          docker tag customer-insights-ui vasantha49/customer-insights-ui:latest
          docker push vasantha49/customer-insights-ui:latest